<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PathMentor — Tu mentor de carrera en tech</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { width: 100%; max-width: 700px; }
    h1 { font-size: 2rem; color: #38bdf8; margin-bottom: 8px; text-align: center; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 32px; font-size: 1rem; }
    .chat-box {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      margin-bottom: 16px;
      border: 1px solid #334155;
    }
    .msg-user { margin-bottom: 16px; text-align: right; }
    .msg-user span {
      background: #0284c7;
      color: white;
      padding: 10px 16px;
      border-radius: 16px 16px 4px 16px;
      display: inline-block;
      max-width: 80%;
      line-height: 1.5;
    }
    .msg-bot { margin-bottom: 16px; text-align: left; }
    .msg-bot span {
      background: #334155;
      color: #e2e8f0;
      padding: 10px 16px;
      border-radius: 16px 16px 16px 4px;
      display: inline-block;
      max-width: 80%;
      line-height: 1.5;
    }
    .msg-bot .nombre { font-size: 0.75rem; color: #38bdf8; margin-bottom: 4px; font-weight: bold; }
    .placeholder { color: #475569; text-align: center; margin-top: 100px; font-size: 0.9rem; }
    .input-area { display: flex; gap: 10px; }
    input[type="text"] {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
    }
    input[type="text"]:focus { border-color: #38bdf8; }
    button {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      min-width: 90px;
    }
    button:hover { background: #7dd3fc; }
    button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .typing { color: #38bdf8; font-size: 0.85rem; margin-bottom: 8px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧭 PathMentor</h1>
    <p class="subtitle">Tu mentor de carrera en tech para latinoamericanos</p>

    <div class="chat-box" id="chat">
      <p class="placeholder" id="placeholder">
        Haz tu primera pregunta sobre carreras en tech 👇
      </p>
    </div>

    <p class="typing" id="typing">🧭 PathMentor está escribiendo...</p>

    <div class="input-area">
      <input type="text" id="userInput"
        placeholder="Ej: ¿Cómo entro a tech desde cero en LATAM?" />
      <button id="btnEnviar" onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <script>
    // 🔑 PEGA TU KEY DE OPENROUTER AQUÍ (empieza con sk-or-...)
    const API_KEY = "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";

    // 🧠 Personalidad del mentor
    const SYSTEM_PROMPT = `Eres PathMentor, un mentor de carrera en tecnología 
especializado en ayudar a jóvenes latinoamericanos a entrar al mundo tech. 
Tu tono es motivador, cercano y directo. Siempre das consejos concretos y 
realistas adaptados a la realidad de LATAM (salarios en dólares remotos, 
plataformas gratuitas, comunidades en español). 
Respondes en español. Tus respuestas son claras y no muy largas (máximo 4 párrafos).
Si alguien pregunta algo que no es sobre carreras tech, redirígelo amablemente 
hacia ese tema.`;

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const chat = document.getElementById('chat');
      const btn = document.getElementById('btnEnviar');
      const typing = document.getElementById('typing');
      const placeholder = document.getElementById('placeholder');
      const text = input.value.trim();

      if (!text) return;

      if (placeholder) placeholder.remove();

      chat.innerHTML += `
        <div class="msg-user">
          <span>${text}</span>
        </div>`;

      input.value = '';
      btn.disabled = true;
      typing.style.display = 'block';
      chat.scrollTop = chat.scrollHeight;

      try {
        const response = await fetch(
          "https://openrouter.ai/api/v1/chat/completions",
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
              model: "openrouter/free",
              messages: [
                { role: "system", content: SYSTEM_PROMPT },
                { role: "user", content: text }
              ]
            })
          }
        );

        const data = await response.json();
        const respuesta = data.choices[0].message.content;

        typing.style.display = 'none';
        chat.innerHTML += `
          <div class="msg-bot">
            <div class="nombre">🧭 PathMentor</div>
            <span>${respuesta}</span>
          </div>`;

      } catch (error) {
        typing.style.display = 'none';
        chat.innerHTML += `
          <div class="msg-bot">
            <span style="color:#f87171">
              ⚠️ Hubo un error al conectar con la IA. 
              Verifica tu API key e intenta de nuevo.
            </span>
          </div>`;
      }

      btn.disabled = false;
      chat.scrollTop = chat.scrollHeight;
      input.focus();
    }

    document.getElementById('userInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
